  <title>Writing | XUNMU WU</title>
  <script>
    (function () {
      var savedLang = localStorage.getItem('aether_lang');
      var browserLangs = (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language || navigator.userLanguage || ''])
        .filter(Boolean)
        .map(function (lang) { return String(lang).toLowerCase(); });
      var detectedLang = browserLangs.some(function (lang) { return lang.indexOf('zh') === 0; }) ? 'zh' : 'en';
      var lang = savedLang || detectedLang;
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.documentElement.classList.add('prelang-' + lang);
    })();
  </script>
